<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PromptEnhancer Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030305;
      --card: #0c0c10;
      --border: rgba(255,255,255,0.08);
      --violet: #7c3aed;
      --violet-light: #a78bfa;
      --text-1: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #475569;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-block {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 0 40px rgba(124,58,237,0.4);
    }
    .logo-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-2);
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .login-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .login-sub { font-size: 14px; color: var(--text-2); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
    }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 14px;
      color: var(--text-1);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .form-input::placeholder { color: var(--text-3); }

    .alert-error {
      background: rgba(225,29,72,0.1);
      border: 1px solid rgba(225,29,72,0.2);
      border-radius: 8px;
      padding: 11px 14px;
      color: #fda4af;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-submit {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
      margin-top: 6px;
    }
    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124,58,237,0.5);
    }
    .btn-submit:active { transform: translateY(0); }

    .footer-links {
      text-align: center;
      margin-top: 20px;
    }
    .footer-links p {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .footer-links a {
      color: var(--violet-light);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-links a:hover { text-decoration: underline; }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-3);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-2); }
  </style>
</head>
<body>

<div class="login-wrap">
  <a href="/" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to home
  </a>

  <div class="logo-block">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
      </svg>
    </div>
    <div class="logo-name">PromptEnhancer Pro</div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to your account</p>
  </div>

  {% if error %}
  <div class="alert-error">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <form method="post" action="{% url 'login' %}{% if next %}?next={{ next }}{% endif %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autofocus autocomplete="email">
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>
  </div>

  <div class="footer-links">
    <p>Don't have an account? <a href="{% url 'request_access' %}">Request access →</a></p>
    <p>Need access? <a href="{% url 'request_access' %}">Request access →</a></p>
  </div>
</div>

</body>
</html>

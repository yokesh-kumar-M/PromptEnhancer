name: CI/CD — PromptEnhancer Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Backend — Django tests & system checks
  # ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend · Django CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system checks & migrations
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          GEMINI_API_KEY: test-key-placeholder
          ADMIN_EMAIL: test@example.com
          BACKEND_URL: http://localhost:8000
        run: |
          python manage.py check
          python manage.py migrate --run-syncdb
          python manage.py makemigrations --check --dry-run

  # ─────────────────────────────────────────────────────────────
  # 2. Frontend — build & deploy to Vercel
  # ─────────────────────────────────────────────────────────────
  frontend-deploy:
    name: Frontend · Vercel Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BACKEND_URL: https://promptenhancer-backend.onrender.com
        run: npm run build

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_A2J6Pbn1fUKAi8NhIxarjxtO
          VERCEL_PROJECT_ID: prj_QqNnXPmw1OQHTqqzmxjM6cplDkSj
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️  VERCEL_TOKEN secret not set — skipping CI deploy."
            echo "   Deploy manually: cd frontend && vercel deploy --prod"
            exit 0
          fi
          npx vercel --prod --yes --token "$VERCEL_TOKEN"

  # ─────────────────────────────────────────────────────────────
  # 3. Chrome extension — build & package
  # ─────────────────────────────────────────────────────────────
  extension-build:
    name: Extension · Chrome Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        env:
          VITE_BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://promptenhancer-backend.onrender.com' }}
        run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../../prompt-enhancer-chrome.zip .
          echo "Packaged: $(du -sh ../../prompt-enhancer-chrome.zip | cut -f1)"

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: prompt-enhancer-chrome.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────
  # 4. VS Code extension — compile & package
  # ─────────────────────────────────────────────────────────────
  vscode-build:
    name: Extension · VS Code Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o ../prompt-enhancer-vscode.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: prompt-enhancer-vscode.vsix
          retention-days: 90

  # ─────────────────────────────────────────────────────────────
  # 5. GitHub Release — bundles all artifacts
  # ─────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [backend-ci, frontend-deploy, extension-build, vscode-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-build${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: chrome-extension
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: release-assets/

      - name: Package CLI
        run: |
          zip -j release-assets/prompt-enhancer-cli.zip \
            cli/enhance.py cli/shell_integration.sh cli/shell_integration.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "PromptEnhancer Pro ${{ steps.version.outputs.tag }}"
          files: |
            release-assets/prompt-enhancer-chrome.zip
            release-assets/prompt-enhancer-vscode.vsix
            release-assets/prompt-enhancer-cli.zip
          body: |
            ## PromptEnhancer Pro ${{ steps.version.outputs.tag }}

            | Platform | File | How to install |
            |----------|------|----------------|
            | Chrome Extension | `prompt-enhancer-chrome.zip` | Unzip → `chrome://extensions` → Dev mode → Load unpacked |
            | VS Code Extension | `prompt-enhancer-vscode.vsix` | Extensions panel → `...` → Install from VSIX |
            | CLI Tool | `prompt-enhancer-cli.zip` | Unzip → `pip install google-generativeai` → set `GEMINI_API_KEY` |

            Built from commit `${{ github.sha }}`.

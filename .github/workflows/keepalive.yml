name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -o /dev/null -w "%{http_code}" --max-time 45 -s \
            https://promptenhancer-backend.onrender.com/api/health/)
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backend returned $STATUS — may still be waking up"
          fi

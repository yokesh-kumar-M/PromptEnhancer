{% extends "base.html" %}
{% block title %}Sign In — PromptEnhancer Pro{% endblock %}

{% block content %}
<section style="max-width: 420px; margin: 60px auto; padding: 0 24px;">

  <div style="text-align: center; margin-bottom: 32px;">
    <div style="width: 52px; height: 52px; background: linear-gradient(135deg, #7c3aed, #4f46e5); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 style="font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em;">Sign In</h1>
    <p style="color: #71717a; font-size: 14px;">Welcome back to PromptEnhancer Pro</p>
  </div>

  {% if error %}
    <div class="alert-error" style="margin-bottom: 20px;">{{ error }}</div>
  {% endif %}

  <div class="card" style="padding: 28px;">
    <form method="post" action="{% url 'login' %}{% if next %}?next={{ next }}{% endif %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div style="margin-bottom: 16px;">
        <label class="label" for="email">Email Address</label>
        <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required autofocus autocomplete="email">
      </div>

      <div style="margin-bottom: 24px;">
        <label class="label" for="password">Password</label>
        <input class="input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px;">
        Sign In
      </button>
    </form>
  </div>

  <div style="text-align: center; margin-top: 16px;">
    <p style="font-size: 13px; color: #52525b; margin-bottom: 8px;">
      Don't have an account? <a href="{% url 'request_access' %}" style="color: #8b5cf6; text-decoration: none;">Request access →</a>
    </p>
    <p style="font-size: 13px; color: #52525b;">
      Have an invite code? <a href="{% url 'register' %}" style="color: #8b5cf6; text-decoration: none;">Register →</a>
    </p>
  </div>

</section>
{% endblock %}
